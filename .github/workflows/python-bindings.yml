name: Python bindings

on:
  workflow_dispatch:
  create:

permissions:
  contents: write

jobs:
  build-wheels:
    name: Build wheel (${{ matrix.name }})
    if: github.event_name != 'create' || github.event.ref_type == 'tag'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
            python-interpreter: python3.10
          - name: macos-arm64
            os: macos-latest
            python-interpreter: python
          - name: windows-x86_64
            os: windows-latest
            python-interpreter: python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --features python --out dist --interpreter ${{ matrix.python-interpreter }}
          manylinux: 2014

      - name: Install wheel
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl

      - name: Import smoke test
        run: |
          python -c "import w2v_bert_uk; assert hasattr(w2v_bert_uk, 'Transcriber'); assert hasattr(w2v_bert_uk, 'transcribe_file')"

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: dist/*.whl
          if-no-files-found: error

  publish-release:
    name: Upload wheels to release
    needs: build-wheels
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'create' && github.event.ref_type == 'tag')
    runs-on: ubuntu-22.04

    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Upload wheels to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'create' && github.event.ref || github.ref_name }}
          files: dist/*.whl
          fail_on_unmatched_files: true
